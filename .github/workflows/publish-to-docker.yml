name: Publish to Docker Hub

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build & verify only, no real publish)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry_run:
        description: 'Dry run (build & verify only, no real publish)'
        type: boolean
        default: false

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build & Test
        run: ./gradlew build --warning-mode all

      - name: Log in to Docker Hub
        if: inputs.dry_run != true
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          username: ${{ secrets.DOCKER_MIRAGON_USERNAME }}
          password: ${{ secrets.DOCKER_MIRAGON_PASSWORD }}

      - name: Build Docker Image
        run: ./gradlew :bpmn-to-code-web:dockerBuild

      - name: Push Docker Image
        if: inputs.dry_run != true
        run: ./gradlew :bpmn-to-code-web:dockerPush

      - name: Push Latest Tag
        if: inputs.dry_run != true
        run: docker push miragon/bpmn-to-code-web:latest

      - name: Update Docker Hub Description
        if: inputs.dry_run != true
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4
        with:
          username: ${{ secrets.DOCKER_MIRAGON_USERNAME }}
          password: ${{ secrets.DOCKER_MIRAGON_PASSWORD }}
          repository: miragon/bpmn-to-code-web
          readme-filepath: ./bpmn-to-code-web/README.md

      - name: Log out from Docker Hub
        if: always() && inputs.dry_run != true
        run: docker logout
